# JARVIS Startup Configuration
# This file controls how JARVIS behaves when it starts

[STARTUP_MODE]
# Options: text, gui, voice
# text = fastest, no microphone needed
# gui = visual interface with buttons  
# voice = full voice control (requires microphone)
default_mode = text

[AUTOSTART]
# Enable background startup
enabled = true
mode = text
# delay in seconds before starting
delay_seconds = 2

[DISPLAY]
# Show welcome message on startup
show_welcome = true
# Show available commands on startup
show_help_on_startup = false

[LOGGING]
# Log all interactions
enabled = true
log_file = jarvis_log.txt
# Maximum log file size before rotation (MB)
max_size_mb = 10

[PERFORMANCE]
# Run in quiet mode (less console output)
quiet_mode = false
# Enable threading for faster response
threading_enabled = true

[FEATURES]
# Enable voice recognition
voice_enabled = true
# Enable text-to-speech responses
speech_enabled = true
# Enable GUI mode
gui_enabled = true
# Enable system control (lock screen, volume, etc)
system_control_enabled = true
